# Small model config — fast iteration and sanity checks

model:
  hidden_dim: 64
  num_heads: 2
  num_layers: 2
  dropout: 0.1
  num_agents: 6
  num_failure_classes: 13

training:
  num_epochs: 5
  batch_size: 16
  learning_rate: 1.0e-3
  weight_decay: 1.0e-4
  patience: 5
  seed: 42

preprocessing:
  embedding_model: "all-MiniLM-L6-v2"   # faster, smaller embeddings
  llm_feature_dim: 384
  non_llm_feature_dim: 32
  max_spans_per_trace: 100
